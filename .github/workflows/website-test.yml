# Runs the tests in the `test` folder
# Figures out supported FDI versions, and runs tests using all corresponding Node SDK versions

name: "Website Tests"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - master
      - "v[0-9]+.[0-9]+"
    tags:
      - "(dev-)?v[0-9]+.[0-9]+.[0-9]+"

jobs:
  define-versions:
    runs-on: ubuntu-latest
    outputs:
      fdiVersions: ${{ steps.versions.outputs.fdiVersions }}
      cdiVersions: ${{ steps.versions.outputs.cdiVersions }}
      nodeVersions: '["20"]'
    steps:
      - uses: actions/checkout@v4
      - uses: supertokens/get-supported-versions-action@main
        id: versions
        with:
          has-fdi: true
          has-cdi: false

  test:
    runs-on: ubuntu-latest
    needs: define-versions
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.define-versions.outputs.nodeVersions) }}
        fdi-version: ${{ fromJSON(needs.define-versions.outputs.fdiVersions) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: supertokens/get-versions-action@main
        id: versions
        with:
          driver-name: node
          fdi-version: ${{ matrix.fdi-version }}
        env:
          SUPERTOKENS_API_KEY: ${{ secrets.SUPERTOKENS_API_KEY }}

      - name: Start core
        run: docker compose up --wait

      - uses: sattvikc/website-testing-action@patch-1
        with:
          should-clone: 'false'
          version: '' # Not required since we have already cloned the repo
          node-sdk-version: ${{ steps.versions.outputs.nodeTag }}
          path: .
          use-common-app-and-test-server: 'true'
          start-cross-domain-server: 'true'
          check-name-suffix: '[Node=${{ matrix.node-version }}][FDI=${{ matrix.fdi-version }}]'
